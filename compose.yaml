services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coastalrisk_webapp_v1}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-coastalrisk_webapp_v1}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8010
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-coastalrisk_webapp_v1}
      STORAGE_DIR: /app/storage
      MODEL_DIR: /app/storage/models
      REPORT_DIR: /app/storage/reports
      UPLOAD_DIR: /app/storage/uploads
      CORS_ORIGINS: ${CORS_ORIGINS:-https://your-frontend-domain}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
    expose:
      - "8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/api/health')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  backend_storage:
